                      type: string
                      example: Attn- IP Docket
                    addressLineOneText:
                      type: string
                      example: 701 FIFTH AVENUE, SUITE 5400
                    addressLineTwoText:
                      type: string
                      example: Suite 501
                    geographicRegionName:
                      type: string
                      example: WASHINGTON
                    geographicRegionCode:
                      type: string
                      example: WA
                    postalCode:
                      type: string
                      example: 98104-7092
                    cityName:
                      type: string
                      example: SEATTLE
                    countryCode:
                      type: string
                      example: US
                    countryName:
                      type: string
                      example: USA
                    postalAddressCategory:
                      type: string
                      example: commercial
                description: Collection of correspondences
              assignmentBag:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
              recordAttorney:
                $ref: "#/components/schemas/RecordAttorney"
              foreignPriorityBag:
                type: array
                items:
