                type: array
                items:
                  $ref: "#/components/schemas/ChildContinuityData"
              patentTermAdjustmentData:
                $ref: "#/components/schemas/PatentTermAdjustment"
              eventDataBag:
                type: array
                items:
                  $ref: "#/components/schemas/EventData"
              pgpubDocumentMetaData:
                $ref: "#/components/schemas/PGPubFileMetaData"
              grantDocumentMetaData:
                $ref: "#/components/schemas/GrantFileMetaData"
              lastIngestionDateTime:
                type: string
                example: 2024-09-15T21:19:01
                format: yyyy-MM-ddTHH:mm:ss
        facets:
          type: array
          items:
            type: object
            properties:
              applicationStatusCode:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                      example: Utility
                    count:
                      type: integer
                      example: 44673
    ApplicationMetaData:
      type: object
      description: Represents patent application meta data properties
      properties:
