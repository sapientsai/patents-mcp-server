          schema:
            type: string
          examples:
            No Search Text:
              summary: No conditions
              description: Empty, No conditions
              value:
            Exact Phrase:
              value: TANG
              description: Search text 'TANG' across the searchable data fields
            Exact Phrase AND:
              value: TANG AND 1700
              description: Search text 'TANG' AND '1700' across all searchable fields within data set
            Search By Field Value:
              value: interferenceNumber:103751
              description: Search data for interference number 103751
            Boolean OR:
              value: seniorPartyData.patentOwnerName:TANG OR seniorPartyData.groupArtUnitNumber:1763
              description: Search data where patentOwnerName is TANG groupArtUnitNumber is 1763
            Boolean AND:
              value: seniorPartyData.patentOwnerName:TANG AND seniorPartyData.groupArtUnitNumber:1763
              description: Search data where patentOwnerName is both TANG and groupArtUnitNumber value is 1763
            Wildcard:
              value: seniorPartyData.patentNumber:66145*
              description: Search data where patentNumber has text 66145 followed by any character
            Range:
              value: seniorPartyData.grantDate:[2003-07-18 TO 2004-07-18]
              description: Search data where grantDate range is between 2003-07-18 TO 2004-07-18
            Comparison:
              value: seniorPartyData.groupArtUnitNumber:>600
              description: Search all records where groupArtUnitNumber is greater than 600
        - name: sort
